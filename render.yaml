services:
  - type: web
    name: cv-parser
    runtime: python
    pythonVersion: "3.10.12"
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "gunicorn app:app --timeout 120 --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.12"